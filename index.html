<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Jeffrey Alloy Q. Abanto</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d0d0d;
    color: #eaeaea;
    text-align: center;
}

/* CONTAINER */
.container {
    max-width: 800px;
    margin: auto;
    padding: 40px 20px;
}

/* IMAGE */
.hero-img {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 30px;
}

/* TEXT */
h1 {
    font-size: 2.5rem;
    margin-bottom: 15px;
}

p {
    color: #bbb;
    margin-bottom: 25px;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 12px 25px;
    background: #4da6ff;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
}

.btn:hover {
    background: #3385cc;
}

/* GALLERY */
.gallery {
    margin-top: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    height: 150px;
    object-fit: cover;
}

/* FOOTER */
footer {
    margin-top: 40px;
    padding: 20px;
    color: #777;
    border-top: 1px solid #222;
}
</style>
</head>

<body>

<div class="container">

    <!-- MAIN IMAGE -->
    <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216"
         alt="Thank You"
         class="hero-img">

    <!-- MESSAGE -->
    <h1>Thank You!</h1>
    <p>Your message has been successfully sent. I appreciate your message to me and will get back to you as soon as possible.</p>

   

<footer>
    <p>© 2026 Jeffrey Alloy Q. Abanto</p>
</footer>

</body>
</html>
